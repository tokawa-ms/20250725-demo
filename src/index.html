<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テトリス - 80年代レトロスタイル</title>
    <style>
        /* Inline CSS for CDN-free operation */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0a0a0a; 
            color: #00ff00; 
            font-family: 'Courier New', monospace;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .text-center { text-align: center; }
        .mb-8 { margin-bottom: 2rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .lg\\:flex-row { flex-direction: row; }
        .gap-8 { gap: 2rem; }
        .max-w-7xl { max-width: 80rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .flex-1 { flex: 1; }
        .justify-center { justify-content: center; }
        .lg\\:w-80 { width: 20rem; }
        .space-y-6 > * + * { margin-top: 1.5rem; }
        .space-y-2 > * + * { margin-top: 0.5rem; }
        .space-y-1 > * + * { margin-top: 0.25rem; }
        .justify-between { justify-content: space-between; }
        .w-full { width: 100%; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
        .p-4 { padding: 1rem; }
        .p-8 { padding: 2rem; }
        .text-6xl { font-size: 3.75rem; line-height: 1; }
        .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
        .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
        .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
        .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
        .text-2xl { font-size: 1.5rem; line-height: 2rem; }
        .font-bold { font-weight: bold; }
        .bg-black { background-color: #000000; }
        .bg-retro-bg { background-color: #0a0a0a; }
        .text-retro-green { color: #00ff00; }
        .text-retro-cyan { color: #00ffff; }
        .text-retro-yellow { color: #ffff00; }
        .text-retro-purple { color: #ff00ff; }
        .text-retro-red { color: #ff0000; }
        .text-retro-orange { color: #ff8000; }
        .text-black { color: #000000; }
        .border-retro-green { border-color: #00ff00; }
        .border-retro-cyan { border-color: #00ffff; }
        .border-retro-yellow { border-color: #ffff00; }
        .border-retro-purple { border-color: #ff00ff; }
        .border-retro-red { border-color: #ff0000; }
        .border-retro-orange { border-color: #ff8000; }
        .border { border-width: 1px; border-style: solid; }
        .fixed { position: fixed; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
        .bg-opacity-80 { background-color: rgba(0, 0, 0, 0.8); }
        .items-center { align-items: center; }
        .hidden { display: none; }
        .top-4 { top: 1rem; }
        .left-4 { left: 1rem; }
        .transition-colors { transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out; }
        button { cursor: pointer; border: none; }
        .hover\\:bg-retro-green:hover { background-color: #00ff00; }
        .hover\\:bg-retro-yellow:hover { background-color: #ffff00; }
        .hover\\:bg-retro-red:hover { background-color: #ff0000; }
        .hover\\:bg-retro-cyan:hover { background-color: #00ffff; }
        .hover\\:bg-retro-purple:hover { background-color: #ff00ff; }
        .hover\\:text-black:hover { color: #000000; }
        
        /* Retro text styling */
        .retro-text {
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px currentColor;
        }
        
        .retro-border {
            border: 2px solid;
            box-shadow: 0 0 20px currentColor inset, 0 0 20px currentColor;
        }
        
        .pixel-perfect {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        .game-board {
            background: 
                linear-gradient(90deg, #001122 50%, transparent 50%),
                linear-gradient(#001122 50%, transparent 50%);
            background-size: 20px 20px;
        }
        
        .neon-glow {
            animation: neonGlow 2s ease-in-out infinite alternate;
        }
        
        @keyframes neonGlow {
            from {
                text-shadow: 0 0 5px currentColor, 0 0 10px currentColor, 0 0 15px currentColor;
            }
            to {
                text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            }
        }
        
        .tetromino {
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* Media queries for responsive design */
        @media (min-width: 1024px) {
            .lg\\:flex-row { flex-direction: row; }
            .lg\\:w-80 { width: 20rem; }
        }
        
        @media (max-width: 768px) {
            .text-6xl { font-size: 2.5rem; }
            .container { padding: 1rem; }
            .gap-8 { gap: 1rem; }
        }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        .retro-text {
            font-family: 'Orbitron', 'Courier New', monospace;
            text-shadow: 0 0 10px currentColor;
        }
        
        .retro-border {
            border: 2px solid;
            box-shadow: 0 0 20px currentColor inset, 0 0 20px currentColor;
        }
        
        .pixel-perfect {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        .game-board {
            background: 
                linear-gradient(90deg, #001122 50%, transparent 50%),
                linear-gradient(#001122 50%, transparent 50%);
            background-size: 20px 20px;
        }
        
        .neon-glow {
            animation: neonGlow 2s ease-in-out infinite alternate;
        }
        
        @keyframes neonGlow {
            from {
                text-shadow: 0 0 5px currentColor, 0 0 10px currentColor, 0 0 15px currentColor;
            }
            to {
                text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            }
        }
        
        .tetromino {
            width: 20px;
            height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-retro-bg text-retro-green min-h-screen font-retro">
    <!-- ゲームコンテナ -->
    <div class="container mx-auto px-4 py-8">
        <!-- ヘッダー -->
        <header class="text-center mb-8">
            <h1 class="text-6xl font-bold retro-text neon-glow text-retro-cyan mb-4">
                TETRIS
            </h1>
            <p class="text-xl retro-text text-retro-yellow">
                80年代レトロスタイル
            </p>
        </header>

        <!-- メインゲームエリア -->
        <div class="flex flex-col lg:flex-row gap-8 max-w-7xl mx-auto">
            <!-- ゲームボード -->
            <div class="flex-1 flex justify-center">
                <div class="retro-border border-retro-cyan bg-black p-4">
                    <canvas id="gameBoard" width="200" height="400" 
                            class="game-board pixel-perfect bg-retro-bg">
                    </canvas>
                </div>
            </div>

            <!-- サイドパネル -->
            <div class="lg:w-80 space-y-6">
                <!-- スコア表示 -->
                <div class="retro-border border-retro-green bg-black p-4">
                    <h3 class="text-xl font-bold retro-text text-retro-green mb-3">スコア</h3>
                    <div class="space-y-2 text-lg retro-text">
                        <div class="flex justify-between">
                            <span>現在:</span>
                            <span id="currentScore" class="text-retro-yellow">0</span>
                        </div>
                        <div class="flex justify-between">
                            <span>ライン:</span>
                            <span id="linesCleared" class="text-retro-cyan">0</span>
                        </div>
                        <div class="flex justify-between">
                            <span>レベル:</span>
                            <span id="level" class="text-retro-purple">1</span>
                        </div>
                        <div class="flex justify-between">
                            <span>ハイスコア:</span>
                            <span id="highScore" class="text-retro-red">0</span>
                        </div>
                    </div>
                </div>

                <!-- 次のブロック -->
                <div class="retro-border border-retro-purple bg-black p-4">
                    <h3 class="text-xl font-bold retro-text text-retro-purple mb-3">次のブロック</h3>
                    <canvas id="nextPiece" width="80" height="80" 
                            class="pixel-perfect bg-retro-bg border border-retro-purple">
                    </canvas>
                </div>

                <!-- ゲーム操作説明 -->
                <div class="retro-border border-retro-yellow bg-black p-4">
                    <h3 class="text-xl font-bold retro-text text-retro-yellow mb-3">操作方法</h3>
                    <div class="space-y-1 text-sm retro-text">
                        <div>← → : 左右移動</div>
                        <div>↑ : 回転</div>
                        <div>↓ : 高速落下</div>
                        <div>SPACE : 即座に落下</div>
                        <div>P : 一時停止</div>
                        <div>R : リセット</div>
                        <div>S : ゲーム開始</div>
                    </div>
                </div>

                <!-- ゲーム制御ボタン -->
                <div class="retro-border border-retro-orange bg-black p-4">
                    <h3 class="text-xl font-bold retro-text text-retro-orange mb-3">ゲーム制御</h3>
                    <div class="space-y-2">
                        <button id="startBtn" 
                                class="w-full py-2 px-4 retro-border border-retro-green bg-retro-bg text-retro-green retro-text hover:bg-retro-green hover:text-black transition-colors">
                            ゲーム開始 (S)
                        </button>
                        <button id="pauseBtn" 
                                class="w-full py-2 px-4 retro-border border-retro-yellow bg-retro-bg text-retro-yellow retro-text hover:bg-retro-yellow hover:text-black transition-colors">
                            一時停止 (P)
                        </button>
                        <button id="resetBtn" 
                                class="w-full py-2 px-4 retro-border border-retro-red bg-retro-bg text-retro-red retro-text hover:bg-retro-red hover:text-black transition-colors">
                            リセット (R)
                        </button>
                    </div>
                </div>

                <!-- 音楽制御 -->
                <div class="retro-border border-retro-cyan bg-black p-4">
                    <h3 class="text-xl font-bold retro-text text-retro-cyan mb-3">音楽設定</h3>
                    <div class="space-y-2">
                        <button id="musicToggle" 
                                class="w-full py-2 px-4 retro-border border-retro-cyan bg-retro-bg text-retro-cyan retro-text hover:bg-retro-cyan hover:text-black transition-colors">
                            BGM: ON
                        </button>
                        <button id="sfxToggle" 
                                class="w-full py-2 px-4 retro-border border-retro-purple bg-retro-bg text-retro-purple retro-text hover:bg-retro-purple hover:text-black transition-colors">
                            効果音: ON
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ゲームオーバー画面 -->
        <div id="gameOverModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center hidden">
            <div class="retro-border border-retro-red bg-retro-bg p-8 text-center">
                <h2 class="text-4xl font-bold retro-text text-retro-red neon-glow mb-4">
                    GAME OVER
                </h2>
                <div class="space-y-2 text-lg retro-text mb-6">
                    <div>最終スコア: <span id="finalScore" class="text-retro-yellow">0</span></div>
                    <div>クリアしたライン: <span id="finalLines" class="text-retro-cyan">0</span></div>
                    <div id="newHighScore" class="text-retro-purple hidden">🎉 新記録！ 🎉</div>
                </div>
                <button id="restartBtn" 
                        class="py-3 px-6 retro-border border-retro-green bg-retro-bg text-retro-green retro-text hover:bg-retro-green hover:text-black transition-colors">
                    もう一度プレイ
                </button>
            </div>
        </div>
    </div>

    <!-- ゲームステータス表示 -->
    <div id="gameStatus" class="fixed top-4 left-4 retro-text text-2xl font-bold"></div>

    <!-- JavaScriptファイルの読み込み -->
    <script src="js/script.js"></script>
</body>
</html>
